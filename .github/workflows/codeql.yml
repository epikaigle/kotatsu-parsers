name: CodeQL

on:
    push:
        branches: [ "master" ]
    pull_request:
        branches: [ "master" ]
        paths:
            - 'src/**'
            - 'build.gradle.kts'
            - 'gradle/libs.versions.toml'
            - '.github/workflows/codeql.yml'
    schedule:
        -   cron: '17 4 * * 1'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    analyze:
        name: Analyze (${{ matrix.language }})
        runs-on: ubuntu-latest
        timeout-minutes: 45
        permissions:
            security-events: write
            actions: read
            contents: read

        strategy:
            fail-fast: false
            matrix:
                language: [ 'java-kotlin' ]

        steps:
            -   name: Checkout repository 🌏
                uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

            -   name: Set up Java environment 🔧
                uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5 # v5.2.0
                with:
                    java-version: '11'
                    distribution: 'temurin'

            -   name: Set up Gradle environment 📦
                uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
                with:
                    gradle-version: '9.3.1'

            -   name: Initialize CodeQL 🔍
                uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
                with:
                    languages: ${{ matrix.language }}
                    queries: security-and-quality

            -   name: Build with Gradle 🚀
                run: ./gradlew compileKotlin --no-daemon

            -   name: Perform CodeQL Analysis 🔬
                uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
                with:
                    category: "/language:${{ matrix.language }}"
