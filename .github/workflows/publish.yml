name: Build & Publish

on:
    workflow_dispatch:
    push:
        branches:
            - master
        paths:
            - 'src/main/kotlin/org/koitharu/kotatsu/parsers/**'

env:
    D8_PATH: build/libs/plugin.jar

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository 🌏
                uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2
                with:
                    fetch-depth: 0

            -   name: Fetch latest commit 🔖
                id: meta
                run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

            -   name: Set up Java environment 🔧
                uses: actions/setup-java@fe779bf55ef683c9413269276a7588bb9cedf07a # v5.2.0
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Set up Gradle environment 📦
                uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
                with:
                    gradle-version: '9.3.1'

            -   name: Setup Android SDK 🚀
                uses: android-actions/setup-android@v3

            -   name: Run assemble tasks 🚀
                run: ./gradlew assemble --rerun-tasks

            -   name: Process library with d8 🚀
                env:
                    LIB_PATH: build/libs/kotatsu-parsers.jar
                run: |
                    ## Dex classes after build...
                    if [ -f ${{ env.LIB_PATH }} ]; then
                        d8 --release ${{ env.LIB_PATH }} --output ${{ env.D8_PATH }}
                    else
                        echo "ℹ️ Pre-compiled library not found, skipping D8 step..."
                    fi
                continue-on-error: true

            -   name: Upload artifacts 🌐
                uses: softprops/action-gh-release@v2
                with:
                    repository: mochi-plugins/repository
                    tag_name: ${{ steps.meta.outputs.sha_short }}
                    name: ${{ steps.meta.outputs.sha_short }}
                    body: |
                        Built from commit [`${{ steps.meta.outputs.sha_short }}`](https://github.com/YakaTeam/kotatsu-parsers/commit/${{ github.sha }})
                    files: ${{ env.D8_PATH }}
                    token: ${{ secrets.ARTIFACT_REPO_TOKEN }}
