name: Update summary (for PRs)

on:
    pull_request_target:
        paths:
            - 'src/main/kotlin/org/koitharu/kotatsu/parsers/**'

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: false

env:
    SIGNER_USERNAME: YakaBot
    SIGNER_EMAIL: yakateam@proton.me

permissions:
    contents: write

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository 🌏
                uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2
                with:
                    fetch-depth: 0
                    ref: ${{ github.event.pull_request.head.ref }}
                    repository: ${{ github.event.pull_request.head.repo.full_name }}
                    token: ${{ secrets.GITHUB_TOKEN }}

            -   name: Set up Java environment 🔧
                uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5 # v5.2.0
                with:
                    # Gradle 9+ requires JVM 17 to run; compile target remains JVM 11 via jvmToolchain(11)
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Set up Gradle environment 📦
                uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
                with:
                    gradle-version: '9.3.1'

            -   name: Run ksp tasks 🚀
                run: ./gradlew kspKotlin --rerun-tasks
                continue-on-error: true

            -   name: Check & Push summary 📤
                run: |
                    if git status --porcelain .github/summary.yaml | grep .; then
                        git config user.name "${{ env.SIGNER_USERNAME }}"
                        git config user.email "${{ env.SIGNER_EMAIL }}"
                        git add .github/summary.yaml
                        git commit -m "chore: Update summary after compiling the library"
                        git push
                        echo "ℹ️ Summary updated"
                    else
                        echo "ℹ️ No changes in summary"
                    fi
