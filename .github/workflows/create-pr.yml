name: Update summary (for master branch)

on:
    push:
        branches:
            - master
        paths:
            - 'src/main/kotlin/org/koitharu/kotatsu/parsers/**'

env:
    SIGNER_USERNAME: YakaBot
    SIGNER_EMAIL: yakateam@proton.me

permissions:
    contents: write
    pull-requests: write

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository 🌏
                uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2
                with:
                    fetch-depth: 0
                    ref: ${{ github.event.pull_request.head.ref }}
                    repository: ${{ github.event.pull_request.head.repo.full_name }}
                    token: ${{ secrets.GITHUB_TOKEN }}

            -   name: Set up Java environment 🔧
                uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5 # v5.2.0
                with:
                    # Gradle 9+ requires JVM 17 to run; compile target remains JVM 11 via jvmToolchain(11)
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Set up Gradle environment 📦
                uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
                with:
                    gradle-version: '9.3.1'

            -   name: Run ksp tasks 🚀
                run: ./gradlew kspKotlin --rerun-tasks
                continue-on-error: true

            -   name: Check summary changes 📤
                id: summary_check
                run: |
                    if git status --porcelain .github/summary.yaml | grep .; then
                      echo "changed=true" >> $GITHUB_OUTPUT
                    else
                      echo "changed=false" >> $GITHUB_OUTPUT
                    fi

            -   name: Commit summary change 📦
                if: steps.summary_check.outputs.changed == 'true'
                run: |
                    git config user.name "${{ env.SIGNER_USERNAME }}"
                    git config user.email "${{ env.SIGNER_EMAIL }}"
                    git checkout -b auto/update
                    git add .github/summary.yaml
                    git commit -m "chore: Update summary after compiling the library"


            -   name: Create Pull Request 🚀
                if: steps.summary_check.outputs.changed == 'true'
                uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
                with:
                    token: ${{ secrets.GITHUB_TOKEN }}
                    branch: auto/update
                    title: "chore(actions): Update summary after building this library"
                    body: |
                        > [!IMPORTANT]
                        > There may be an issue with how the number of available sources for this library is currently counted
                        >
                        > Please review the summary if anything looks incorrect.

                        🔄 Triggered after library build workflow completes

                        🤖 Generated automatically via [GitHub Actions](https://github.com/features/actions)
                    base: master
